[package]
name = "rakka-rs"
description = "Native Rust runtime for actor-based concurrent and distributed systems. Umbrella crate — pull in subsystems via feature flags."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
documentation = "https://docs.rs/rakka-rs"
readme = "README.md"
keywords = ["actor", "concurrency", "distributed", "async", "supervisor"]
categories = ["concurrency", "asynchronous", "network-programming"]

[dependencies]
rakka-core = { workspace = true }
rakka-config = { workspace = true }
rakka-macros = { workspace = true, optional = true }
rakka-testkit = { workspace = true, optional = true }
rakka-remote = { workspace = true, optional = true }
rakka-cluster = { workspace = true, optional = true }
rakka-cluster-tools = { workspace = true, optional = true }
rakka-cluster-sharding = { workspace = true, optional = true }
rakka-cluster-metrics = { workspace = true, optional = true }
rakka-distributed-data = { workspace = true, optional = true }
rakka-persistence = { workspace = true, optional = true }
rakka-persistence-query = { workspace = true, optional = true }
rakka-streams = { workspace = true, optional = true }
rakka-coordination = { workspace = true, optional = true }
rakka-discovery = { workspace = true, optional = true }
rakka-di = { workspace = true, optional = true }
rakka-hosting = { workspace = true, optional = true }
rakka-telemetry = { workspace = true, optional = true }

[features]
# A bare `rakka` dependency gives you the actor system, config, and the
# ergonomic macros — nothing else. Reach for additional subsystems by
# turning on their feature flags. Each flag also re-exports the crate
# under a stable namespace (`rakka::cluster`, `rakka::persistence`, …).
default = ["macros"]

# Ergonomic derives + helpers (`#[derive(Actor)]`, `props!`, etc.).
macros = ["dep:rakka-macros"]

# Test scaffolding — probes, virtual time, multi-node spec.
testkit = ["dep:rakka-testkit"]

# Cross-process / cross-host messaging.
remote = ["dep:rakka-remote"]

# Membership, gossip, reachability, split-brain resolvers.
cluster = ["dep:rakka-cluster", "remote"]

# Singleton, distributed pub/sub, cluster client.
cluster-tools = ["dep:rakka-cluster-tools", "cluster"]

# Sharded entities with rebalance + remember-entities.
cluster-sharding = ["dep:rakka-cluster-sharding", "cluster", "persistence", "distributed-data"]

# Adaptive load balancing on top of cluster metrics.
cluster-metrics = ["dep:rakka-cluster-metrics", "cluster"]

# Convergent replicated data types over the cluster.
distributed-data = ["dep:rakka-distributed-data", "cluster"]

# Event sourcing — journals, snapshots, recovery.
persistence = ["dep:rakka-persistence"]

# Tagged event streams over journals.
persistence-query = ["dep:rakka-persistence-query", "persistence"]

# Typed reactive streams DSL.
streams = ["dep:rakka-streams"]

# Lease-based leadership primitives.
coordination = ["dep:rakka-coordination"]

# Pluggable service discovery.
discovery = ["dep:rakka-discovery"]

# Dependency-injection container.
di = ["dep:rakka-di"]

# Builder API for system + config + DI wiring.
hosting = ["dep:rakka-hosting", "di"]

# Tracing, metrics, exporters.
telemetry = ["dep:rakka-telemetry"]

# Convenience bundle: every subsystem rakka ships, plus macros + testkit.
full = [
  "macros",
  "testkit",
  "remote",
  "cluster",
  "cluster-tools",
  "cluster-sharding",
  "cluster-metrics",
  "distributed-data",
  "persistence",
  "persistence-query",
  "streams",
  "coordination",
  "discovery",
  "di",
  "hosting",
  "telemetry",
]

# Convenience bundle for cluster-grade applications: the actor system,
# remoting, cluster, sharded entities, replicated data, persistence,
# streams, telemetry. Skips DI / hosting / discovery for projects that
# wire those themselves.
cluster-app = [
  "macros",
  "remote",
  "cluster",
  "cluster-tools",
  "cluster-sharding",
  "distributed-data",
  "persistence",
  "persistence-query",
  "streams",
  "telemetry",
]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
