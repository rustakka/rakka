[package]
name = "rakka-telemetry"
description = "rakka telemetry — probe surface for actor trees, dead letters, cluster, sharding, persistence, remote, streams, and distributed-data."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rakka-core = { workspace = true }
rakka-cluster = { workspace = true, optional = true }
rakka-cluster-sharding = { workspace = true, optional = true }
rakka-cluster-metrics = { workspace = true, optional = true }
rakka-persistence = { workspace = true, optional = true }
rakka-remote = { workspace = true, optional = true }
rakka-streams = { workspace = true, optional = true }
rakka-distributed-data = { workspace = true, optional = true }
rakka-config = { workspace = true }

tokio = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }

# Prometheus exporter (opt-in)
prometheus = { version = "0.13", optional = true, default-features = false }

# OpenTelemetry exporter (opt-in)
opentelemetry = { version = "0.24", optional = true, default-features = false, features = ["metrics", "trace"] }
opentelemetry_sdk = { version = "0.24", optional = true, default-features = false, features = ["metrics", "trace", "rt-tokio"] }
opentelemetry-otlp = { version = "0.17", optional = true, default-features = false, features = ["metrics", "trace"] }
opentelemetry-stdout = { version = "0.5", optional = true, default-features = false, features = ["metrics", "trace"] }

[features]
default = ["cluster", "persistence", "remote", "streams", "ddata", "sharding", "cluster-metrics"]

# Which rakka subsystems this crate probes.
cluster = ["dep:rakka-cluster"]
sharding = ["dep:rakka-cluster-sharding"]
cluster-metrics = ["dep:rakka-cluster-metrics"]
persistence = ["dep:rakka-persistence"]
remote = ["dep:rakka-remote"]
streams = ["dep:rakka-streams"]
ddata = ["dep:rakka-distributed-data"]

# Exporters (disabled by default, pulled in by dashboard features).
prometheus = ["dep:prometheus"]
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk"]
otel-otlp-grpc = ["otel", "dep:opentelemetry-otlp", "opentelemetry-otlp/grpc-tonic"]
otel-otlp-http = ["otel", "dep:opentelemetry-otlp", "opentelemetry-otlp/http-proto", "opentelemetry-otlp/reqwest-client"]
otel-stdout = ["otel", "dep:opentelemetry-stdout"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
toml = { workspace = true }
async-trait = { workspace = true }

[lints]
workspace = true
