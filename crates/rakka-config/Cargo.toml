[package]
name = "rakka-config"
description = "Layered HOCON-style configuration for rakka — `include`, `${path}` substitution, `${?ENV}`, dotted keys, arrays."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "../../README.md"
documentation = "https://docs.rs/rakka-config"
keywords = ["actor", "config", "hocon"]
categories = ["config", "concurrency"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
