[package]
name = "rustakka-profiler"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Actor memory + CPU performance profiler for rustakka (Rust + Python)."

[lib]
path = "src/lib.rs"

[[bin]]
name = "rustakka-profiler"
path = "src/bin/rustakka_profiler.rs"

[dependencies]
rustakka = { path = "../rustakka" }
rustakka-core = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
