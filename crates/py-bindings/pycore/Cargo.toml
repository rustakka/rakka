[package]
name = "atomr-pycore"
description = "Python bindings for atomr-core via PyO3."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

[dependencies]
atomr-core = { workspace = true }
atomr-config = { workspace = true }
atomr-testkit = { workspace = true }
atomr-remote = { workspace = true }
atomr-cluster = { workspace = true }
atomr-cluster-tools = { workspace = true }
atomr-cluster-sharding = { workspace = true }
atomr-cluster-metrics = { workspace = true }
atomr-distributed-data = { workspace = true }
atomr-distributed-data-lmdb = { workspace = true }
atomr-persistence = { workspace = true }
atomr-streams = { workspace = true }
atomr-coordination = { workspace = true }
atomr-discovery = { workspace = true }
atomr-di = { workspace = true }
atomr-hosting = { workspace = true }
atomr-telemetry = { workspace = true }
atomr-dashboard = { workspace = true, features = ["aggregator"] }

pyo3 = { workspace = true, features = ["abi3-py310", "macros"] }
pyo3-async-runtimes = { workspace = true }
tokio = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
once_cell = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[lints]
workspace = true
