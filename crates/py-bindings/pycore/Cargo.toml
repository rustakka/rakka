[package]
name = "rakka-pycore"
description = "Python bindings for rakka-core via PyO3."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

[dependencies]
rakka-core = { workspace = true }
rakka-config = { workspace = true }
rakka-testkit = { workspace = true }
rakka-remote = { workspace = true }
rakka-cluster = { workspace = true }
rakka-cluster-tools = { workspace = true }
rakka-cluster-sharding = { workspace = true }
rakka-distributed-data = { workspace = true }
rakka-persistence = { workspace = true }
rakka-streams = { workspace = true }
rakka-coordination = { workspace = true }
rakka-discovery = { workspace = true }
rakka-di = { workspace = true }
rakka-hosting = { workspace = true }
rakka-telemetry = { workspace = true }
rakka-dashboard = { workspace = true, features = ["aggregator"] }

pyo3 = { workspace = true, features = ["abi3-py310", "macros"] }
pyo3-async-runtimes = { workspace = true }
tokio = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
once_cell = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[lints]
workspace = true
