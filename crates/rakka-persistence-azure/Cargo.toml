[package]
name = "rakka-persistence-azure"
description = "Azure Table Storage journal and snapshot store for rakka."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "../../README.md"
documentation = "https://docs.rs/rakka-persistence-azure"
keywords = ["actor", "event-sourcing", "azure"]
categories = ["database", "concurrency"]

[features]
default = ["tables"]
tables = []
cosmos = []
integration = []

[dependencies]
rakka-persistence = { workspace = true }
rakka-persistence-query = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
rakka-persistence-tck = { workspace = true }
tokio = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
