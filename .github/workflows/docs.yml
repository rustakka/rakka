name: Docs

# Publish the mkdocs-material site (under `docs/`) to GitHub Pages.
# Runs on every push to `main` and on every `v*` tag, so the live
# docs always match either the latest development tip or the most
# recently released version.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mkdocs-material
        run: pip install mkdocs-material
      - name: Build site
        run: mkdocs build --strict --site-dir _site
      # Pages config is best-effort — until a repo admin flips
      # Settings → Pages → Source = "GitHub Actions", the
      # GITHUB_TOKEN can't auto-enable the site. Don't fail the
      # workflow on that; the mkdocs build itself is the gate.
      - id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
      - if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.outputs.pages_ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
