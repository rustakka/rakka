name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 1 */3 *" # quarterly upstream diff

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: audit (regression check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check audit metrics vs 2026-04 baseline
        run: cargo xtask audit --check

  rustdoc:
    name: rustdoc (broken-link gate)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -D rustdoc::broken-intra-doc-links --cfg docsrs"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --workspace --no-deps --all-features
        run: cargo doc --workspace --no-deps --all-features

  verify:
    name: verify (1.0-rc gate)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run xtask verify (build + test + clippy + audit-check)
        run: cargo xtask verify

  semver-checks:
    name: semver-checks (cargo-semver-checks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Warn-only on 0.x pre-release commits; hard fail once any
    # workspace crate hits 1.0 (15.E gate). The version line below
    # is the single source of truth — flip from `0.` to `1.` to
    # arm the gate.
    continue-on-error: ${{ !startsWith(vars.ATOMR_WORKSPACE_VERSION || '0.', '1.') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Check public-API SemVer for every published crate
        run: |
          set -e
          fails=0
          for crate in atomr atomr-core atomr-config atomr-macros atomr-testkit \
                       atomr-remote atomr-cluster atomr-cluster-tools \
                       atomr-cluster-sharding atomr-cluster-metrics \
                       atomr-distributed-data atomr-persistence \
                       atomr-persistence-query atomr-persistence-tck \
                       atomr-streams atomr-coordination atomr-discovery \
                       atomr-di atomr-hosting; do
            echo "==> $crate"
            cargo semver-checks check-release --package "$crate" || fails=$((fails+1))
          done
          if [ "$fails" -gt 0 ]; then
            echo "$fails crate(s) failed semver-checks"
            exit 1
          fi

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv + install build/test deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio msgpack
      - name: maturin develop
        run: |
          . .venv/bin/activate
          maturin develop --release
      - name: pytest
        run: |
          . .venv/bin/activate
          pytest python/tests -v

  docs:
    name: docs (mkdocs build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mkdocs-material
        run: pip install mkdocs-material
      - name: Build site
        run: mkdocs build --strict --site-dir _site
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: _site/

  upstream-diff:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clone + diff upstream akka.net
        run: |
          python3 scripts/sync-upstream.py \
            --depth 1000 \
            --output upstream-diff.md
      - name: Publish to step summary
        run: cat upstream-diff.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: upstream-diff
          path: upstream-diff.md
