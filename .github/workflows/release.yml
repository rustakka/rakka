name: Release

# Releases are tagged from `main`. Push a tag matching `v*` (e.g.
# `v0.2.0`, `v1.0.0-rc.1`) to fire this pipeline. The bump-and-tag
# step is automated by `.github/workflows/version-bump.yml` (see the
# "version-bump" Claude skill at ~/.claude/skills/version-bump/).
#
# This workflow:
#   1. Runs the 1.0-rc gate (`cargo xtask verify`) so a tag never
#      ships an untested build.
#   2. Builds release binaries (`rakka-dashboard`, `rakka-profiler`)
#      for Linux x86_64 + macOS aarch64.
#   3. Creates the GitHub Release with the artifacts attached.
#   4. Publishes every publishable Rust crate to crates.io in
#      dependency order. Honors `--dry-run` for `workflow_dispatch`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish + maturin upload with --dry-run; skip GitHub Release upload"
        required: false
        default: "true"
      skip_python:
        description: "Skip the Python wheel build/publish jobs"
        required: false
        default: "false"
      skip_crates:
        description: "Skip the crates.io publish job"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (1.0-rc gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask verify
        run: cargo xtask verify

  build-binaries:
    name: Build binaries (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build dashboard SPA (ui/dist for embed-ui)
        shell: bash
        working-directory: crates/rakka-dashboard/ui
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Install cross (Linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Build rakka-dashboard
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p rakka-dashboard --features bin,embed-ui,aggregator,metrics-prometheus
          else
            cargo build --release --target ${{ matrix.target }} -p rakka-dashboard --features bin,embed-ui,aggregator,metrics-prometheus
          fi
      - name: Build rakka-profiler
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p rakka-profiler
          else
            cargo build --release --target ${{ matrix.target }} -p rakka-profiler
          fi
      - name: Stage artifacts (unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p artifacts
          for bin in rakka-dashboard rakka-profiler; do
            src="target/${{ matrix.target }}/release/$bin"
            [ -f "$src" ] && cp "$src" "artifacts/${bin}-${{ matrix.target }}"
          done
          (cd artifacts && tar czf "rakka-${{ matrix.target }}.tar.gz" rakka-dashboard-* rakka-profiler-*)
      - name: Stage artifacts (windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          foreach ($bin in @("rakka-dashboard", "rakka-profiler")) {
            $src = "target/${{ matrix.target }}/release/$bin${{ matrix.bin_ext }}"
            if (Test-Path $src) { Copy-Item $src "artifacts/$bin-${{ matrix.target }}${{ matrix.bin_ext }}" }
          }
          Compress-Archive -Path "artifacts/rakka-dashboard-*","artifacts/rakka-profiler-*" -DestinationPath "artifacts/rakka-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: rakka-binaries-${{ matrix.target }}
          path: artifacts/rakka-${{ matrix.target }}.${{ matrix.archive_ext }}

  build-wheels:
    name: Build wheels (${{ matrix.target }} / ${{ matrix.os }})
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc + musl, x86_64 + aarch64. maturin uses
          # manylinux/musllinux containers under the hood; the
          # `manylinux: auto` flag picks the right base image.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-target: x86_64
            manylinux: auto
          # NOTE: aarch64-linux-gnu wheel is intentionally not built —
          # `ring` (pulled in transitively by `rustls` via `aws-lc-rs`)
          # fails to cross-compile inside the manylinux container with
          # `__ARM_ARCH` undefined. ARM Linux users install from sdist.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            python-target: x86_64
            manylinux: musllinux_1_2
          # macOS — universal2 yields a single fat wheel covering
          # both x86_64 and arm64 architectures.
          - os: macos-latest
            target: universal2-apple-darwin
            python-target: universal2
            manylinux: "off"
          # Windows.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-target: x64
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.python-target }}
          # Build a wheel per supported CPython ABI on this platform.
          args: --release --strip --out dist --interpreter "python3.10 python3.11 python3.12 python3.13"
          # `auto` builds inside a manylinux container; `off` runs natively.
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: rakka-wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist (Python)
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: rakka-sdist
          path: dist/*.tar.gz

  github-release:
    name: GitHub Release
    needs: [verify, build-binaries, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # The two most recent tags; use HEAD as a fallback for the first release.
          prev=$(git tag --sort=-creatordate | grep -v "^${tag}$" | head -n1 || true)
          range="${prev:+$prev..}HEAD"
          {
            echo "## rakka ${tag}"
            echo
            echo "### Changes"
            git log --no-merges --pretty=format:'- %s (%h)' "${range}"
            echo
            echo
            echo "### Crates published"
            grep -E "rakka-[a-z-]+ = \{ path" Cargo.toml | sed 's/^/- /'
            echo
            echo "### Python wheels"
            ls artifacts | grep "rakka-wheels-" | sed 's/^/- /' || true
          } > RELEASE_NOTES.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: rakka ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.whl

  publish-crates:
    name: Publish to crates.io
    needs: [verify, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_crates != 'true'
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Walk every publishable crate in dependency order. Each
      # `cargo publish` waits briefly for the index to become visible
      # before moving on, so the next crate can resolve its
      # path-dependencies from crates.io. `already uploaded` is
      # treated as success so a partially-completed run can be
      # safely retried by re-tagging.
      - name: Publish all crates in dep order
        run: |
          set -euo pipefail
          # crates.io applies a "new crates per period" rate limit
          # (rolling window). Pace successful new-crate publishes
          # with a sleep, and retry transient 429s after a longer
          # backoff. Already-published crates are skipped in <1s
          # so a re-tag of the same version is cheap.
          publish_one() {
            local crate=$1
            local attempt=1
            while true; do
              echo "==> publishing $crate (attempt $attempt)"
              local out
              if out=$(cargo publish -p "$crate" 2>&1); then
                printf '%s\n' "$out"
                # Throttle between successful new-crate publishes.
                sleep 30
                return 0
              fi
              printf '%s\n' "$out"
              if printf '%s' "$out" | grep -qE "already (uploaded|exists)"; then
                echo "    (already on crates.io — continuing)"
                return 0
              fi
              if printf '%s' "$out" | grep -qE "(429|Too Many Requests|rate.*limit)" && [ $attempt -lt 6 ]; then
                local delay=$((90 * attempt))
                echo "    (rate-limited — sleeping ${delay}s before retry)"
                sleep "$delay"
                attempt=$((attempt + 1))
                continue
              fi
              return 1
            done
          }
          # Strict dep-order — see audit at the bottom of this job
          # for the graph. Adding a new crate? Slot it into the
          # earliest layer that has all its dependencies already
          # published in earlier layers.
          for crate in \
            rakka-config \
            rakka-core \
            rakka-macros rakka-testkit rakka-remote \
            rakka-persistence rakka-streams \
            rakka-coordination rakka-discovery rakka-di \
            rakka-cluster \
            rakka-persistence-tck rakka-persistence-query \
            rakka-hosting \
            rakka-distributed-data rakka-cluster-tools rakka-cluster-metrics \
            rakka-persistence-query-inmemory rakka-persistence-sql \
            rakka-persistence-redis rakka-persistence-mongodb \
            rakka-persistence-cassandra rakka-persistence-aws \
            rakka-persistence-azure \
            rakka-cluster-sharding \
            rakka-telemetry \
            rakka-dashboard \
            rakka-rs; do
            publish_one "$crate"
          done

  publish-crates-dry-run:
    name: Publish to crates.io (dry run)
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run publish (foundation crates)
        run: |
          for c in rakka-config rakka-macros rakka-core rakka-testkit rakka-remote \
                   rakka-distributed-data rakka-cluster rakka-persistence rakka-streams \
                   rakka-cluster-sharding rakka; do
            echo "==> $c"
            cargo publish -p "$c" --dry-run --allow-dirty || true
          done

  publish-pypi:
    name: Publish wheels + sdist to PyPI
    needs: [verify, build-wheels, build-sdist, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_python != 'true'
    # Trusted publishing — configure on PyPI: pypi.org → manage project →
    # publishing → add GitHub publisher (owner / repo / workflow / env).
    environment:
      name: pypi
      url: https://pypi.org/p/rakka
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # Only Python artifacts — binary tarballs share the
          # `*.tar.gz` extension with the sdist but are not valid
          # PyPI uploads, so download just the wheel + sdist
          # artifact buckets.
          pattern: "rakka-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          # If trusted publishing is not yet configured, set
          # `password: ${{ secrets.PYPI_API_TOKEN }}` instead.
          skip-existing: true

  publish-pypi-dry-run:
    name: PyPI dry-run (TestPyPI)
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_python != 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/rakka
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "rakka-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
