site_name: atomr
site_description: Native Rust actor runtime with first-class Python bindings.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
nav:
  - Home: index.md
  - "Actors & agentic systems": actors-and-agentic-computing.md
  - Feature surface: parity.md
  - Depth program: full-port-plan.md
  - Alignment ledger: alignment-ledger.md
  - Depth roadmap: depth-roadmap.md
  - Idiomatic Rust principles: idiomatic-rust.md
  - Audit (2026-04): audit-2026-04.md
  - Architecture: architecture.md
  - Python bindings: python.md
  - Persistence providers: persistence-providers.md
  - Remoting: remoting.md
  - Profiler: profiler.md
  - Dashboard: dashboard.md
  - Observability exporters: observability.md
  - Release process: release-process.md
  - Release pipeline: release-pipeline.md
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
